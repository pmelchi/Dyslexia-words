<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Text analyzer</title>
    <link href="./css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65">
    <script src="./js/jquery-3.6.3.js"></script>
    <script src="./js/custom.js"></script>
</head>
<body>
<h1>Text analyzer</h1>
<div class="container-fluid">
    <div class="row justify-content-md-center">
        <div class="col-1">
            left menu
        </div>
        <div class="col">
            <form id = "analyzerForm">
                <div class="mb-3">
                    <label for="text2analyze" class="form-label">Please enter the text to analyze:</label>
                    <textarea class="form-control" id="text2analyze" rows="3" autofocus></textarea>
                </div>
                <div class="mb-3">
                    <button type="button" class="btn btn-primary" id="submitText">Analyze</button>
                </div>
            </form>
        </div>
        <div class="col bg-light" id="outputDiv">
            <div class="btn-group" role="group" aria-label="Basic example">
    <button type="button" class="btn btn-primary">This</button>
    <button type="button" class="btn btn-primary">is</button>
    <button type="button" class="btn btn-primary">a</button>
    <button type="button" class="btn btn-primary">test.</button>
</div>
        </div>
    </div>
</body>
</html>
